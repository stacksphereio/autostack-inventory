# StackSphere autostack-inventory CI Pipeline
# ARCH VERSION: 0.5
# Purpose: Automated CI/CD with dev/integ deployment

apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: autostack-inventory CI

permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      enable_smart_tests:
        description: "Enable CloudBees Smart Tests integration"
        required: false
        type: string
        default: "false"

jobs:
  test:
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-test.yaml@main
    with:
      component_name: autostack-inventory
      language: go
      enable_smart_tests: "true"
    secrets: inherit
    vars: inherit

  build:
    needs: test
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-build.yaml@main
    with:
      component_name: autostack-inventory
      docker_user: ${{ vars.DOCKER_USER }}
      commit_sha: ${{ cloudbees.scm.sha }}
      push_latest: "true"
      debug: "true"
      upload_tarball: "false"  # Workaround for CBP-34749 (HTTP 500 in post-build-asset-binary)
    secrets: inherit
    vars: inherit

  deploy-dev:
    if: ${{ cloudbees.scm.branch != 'main' }}
    needs: build
    environment: dev
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@main
    with:
      component_name: autostack-inventory
      version: ${{ needs.build.outputs.VERSION }}
      environment: dev
      stack_name: autostack
      docker_repo: ${{ vars.DOCKER_USER }}/autostack-inventory
      artifact_id: ${{ needs.build.outputs.PRIMARY_ARTIFACT_ID }}
      commit_sha: ${{ cloudbees.scm.sha }}
      database_mode: "no-database"
      enable_liquibase: "false"
      feature_flags_enabled: false
    secrets: inherit
    vars: inherit

  deploy-integ:
    if: ${{ cloudbees.scm.branch == 'main' }}
    needs: build
    environment: integ
    uses: github.com/stacksphereio/core-workflows/.cloudbees/workflows/component-deploy.yaml@main
    with:
      component_name: autostack-inventory
      version: ${{ needs.build.outputs.VERSION }}
      environment: integ
      stack_name: autostack
      docker_repo: ${{ vars.DOCKER_USER }}/autostack-inventory
      artifact_id: ${{ needs.build.outputs.PRIMARY_ARTIFACT_ID }}
      commit_sha: ${{ cloudbees.scm.sha }}
      database_mode: "no-database"
      enable_liquibase: "false"
      feature_flags_enabled: false
    secrets: inherit
    vars: inherit
