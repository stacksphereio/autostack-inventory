{{- $security := .Values.security | default dict -}}
{{- if and ($security.createSecret | default false) (not ($security.existingSecret | default "")) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.secretName" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwtSecret: {{ ($security.jwtSecret | default "") | toString | quote }}
{{- end }}
